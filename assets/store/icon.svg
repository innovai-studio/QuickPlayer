<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    <!-- Play button gradient -->
    <linearGradient id="playGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#E0E7FF"/>
    </linearGradient>
    <!-- Speed indicator gradient -->
    <linearGradient id="speedGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#34D399"/>
      <stop offset="100%" style="stop-color:#10B981"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="512" height="512" rx="102" ry="102" fill="url(#bgGrad)"/>

  <!-- Outer ring (loop indicator) -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="24"/>

  <!-- Speed arc (top right) -->
  <path d="M 256 76 A 180 180 0 0 1 436 256"
        fill="none" stroke="url(#speedGrad)" stroke-width="24" stroke-linecap="round"/>

  <!-- Loop arrows -->
  <!-- Arrow 1 (top) -->
  <path d="M 380 120 L 400 95 L 405 130"
        fill="none" stroke="#34D399" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Arrow 2 (bottom) -->
  <path d="M 132 392 L 112 417 L 107 382"
        fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Inner circle background -->
  <circle cx="256" cy="256" r="130" fill="rgba(0,0,0,0.2)"/>

  <!-- Play button triangle -->
  <path d="M 220 175 L 220 337 L 355 256 Z" fill="url(#playGrad)"/>

  <!-- Small speed text indicator -->
  <text x="256" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="rgba(255,255,255,0.9)">1.5x</text>
</svg>
